server:
  port: 8081

spring:
  application:
    name: user-service
  profiles:
    active: local
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:192.168.100.128}:3306/learning_user?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PWD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:192.168.100.128}
      port: 6379
      password: ${REDIS_PWD:}
  cloud:
    nacos:
      discovery:
        enabled: false
        server-addr: ${NACOS_SERVER:localhost:8848}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET:}
  ttl: 604800000
