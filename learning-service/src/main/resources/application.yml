server:
  port: 8086

spring:
  application:
    name: learning-service
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/learning_learning?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PWD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PWD:}
  cloud:
    nacos:
      discovery:
        enabled: false
        server-addr: ${NACOS_SERVER:localhost:8848}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: LearningPlatformJwtSecretKey2026!@#
  ttl: 604800000
