server:
  port: 8082

spring:
  application:
    name: course-service
  profiles:
    active: local
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:192.168.100.128}:3306/learning_course?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PWD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:192.168.100.128}
      port: 6379
      password: ${REDIS_PWD:}
  rabbitmq:
    host: ${RABBITMQ_HOST:192.168.100.128}
    port: 5672
    username: ${RABBITMQ_USER:root}
    password: ${RABBITMQ_PWD:}
    listener:
      simple:
        acknowledge-mode: manual
  cloud:
    nacos:
      discovery:
        enabled: true
        server-addr: ${NACOS_SERVER:192.168.100.128:8848}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET:}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /doc.html
    tags-sorter: alpha
    operations-sorter: method
