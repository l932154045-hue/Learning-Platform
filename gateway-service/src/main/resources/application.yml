server:
  port: 8080

spring:
  main:
    web-application-type: reactive
  application:
    name: gateway-service
  profiles:
    active: local
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:localhost:8848}
        enabled: false
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/user/**
        - id: course-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/course/**
        - id: cart-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/cart/**
        - id: order-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/order/**
        - id: payment-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/payment/**
        - id: learning-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/learning/**
        - id: admin-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/admin/**
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:localhost:8858}

jwt:
  secret: ${JWT_SECRET:}
  ttl: 604800000

logging:
  level:
    com.learning: debug
