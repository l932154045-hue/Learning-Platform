server:
  port: 8087

spring:
  application:
    name: admin-service
  rabbitmq:
    host: ${RABBITMQ_HOST:192.168.100.128}
    port: 5672
    username: ${RABBITMQ_USER:root}
    password: ${RABBITMQ_PWD:040615}
    publisher-confirm-type: correlated
    publisher-returns: true
  cloud:
    openfeign:
      client:
        config:
          course-service:
            url: http://localhost:8082
          user-service:
            url: http://localhost:8081
          order-service:
            url: http://localhost:8084
    nacos:
      discovery:
        enabled: false
        server-addr: ${NACOS_SERVER:localhost:8848}

jwt:
  secret: LearningPlatformJwtSecretKey2026!@#
  ttl: 604800000

logging:
  level:
    com.learning: debug
